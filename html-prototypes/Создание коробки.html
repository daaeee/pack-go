<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack&Go — Создание коробки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F5F7FA;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Основной контейнер — две колонки */
        .create-box-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            gap: 32px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* Левая колонка — форма */
        .form-card {
            flex: 1;
            min-width: 320px;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #E9ECEF;
        }

        /* Правая колонка — превью QR */
        .preview-card {
            width: 380px;
            background: white;
            border-radius: 32px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #E9ECEF;
            position: sticky;
            top: 24px;
        }

        /* Заголовок */
        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: #1E2A3A;
            margin-bottom: 28px;
            letter-spacing: -0.3px;
        }

        /* Группа полей */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1E2A3A;
            margin-bottom: 8px;
        }

        .form-label .optional {
            font-weight: 400;
            color: #ADB5BD;
            font-size: 11px;
        }

        /* Поля ввода */
        .input-field, .select-field, .textarea-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E9ECEF;
            border-radius: 14px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: white;
            color: #1E2A3A;
        }

        .input-field:focus, .select-field:focus, .textarea-field:focus {
            outline: none;
            border-color: #2A5C8F;
            box-shadow: 0 0 0 3px rgba(42, 92, 143, 0.1);
        }

        .input-field::placeholder, .textarea-field::placeholder {
            color: #ADB5BD;
        }

        .textarea-field {
            min-height: 100px;
            resize: vertical;
        }

        /* Зона добавления фото */
        .photo-zone {
            border: 1.5px dashed #DEE2E6;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: #F8F9FA;
            transition: all 0.2s;
        }

        .photo-zone:hover {
            border-color: #2A5C8F;
            background: #F8F9FA;
        }

        .photo-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .photo-text {
            font-size: 13px;
            color: #6C757D;
        }

        .photo-hint {
            font-size: 11px;
            color: #ADB5BD;
            margin-top: 6px;
        }

        /* Чекбокс */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
            cursor: pointer;
        }

        .checkbox-wrapper input {
            width: 18px;
            height: 18px;
            accent-color: #2A5C8F;
            cursor: pointer;
        }

        .checkbox-wrapper label {
            font-size: 14px;
            color: #1E2A3A;
            cursor: pointer;
        }

        /* Кнопка сохранения */
        .btn-primary {
            width: 100%;
            background: #2A5C8F;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #1E4A73;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(42, 92, 143, 0.3);
        }

        /* Превью QR */
        .preview-title {
            font-size: 18px;
            font-weight: 600;
            color: #1E2A3A;
            margin-bottom: 20px;
        }

        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: repeating-linear-gradient(45deg, #2A5C8F 0px, #2A5C8F 4px, #E9ECEF 4px, #E9ECEF 8px);
            border-radius: 24px;
            margin: 0 auto 20px;
        }

        .preview-text {
            font-size: 13px;
            color: #6C757D;
            line-height: 1.5;
        }

        .preview-note {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E9ECEF;
            font-size: 12px;
            color: #ADB5BD;
        }

        /* Адаптивность */
        @media (max-width: 800px) {
            .create-box-container {
                flex-direction: column;
            }
            .preview-card {
                width: 100%;
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="create-box-container">
        <!-- ЛЕВАЯ КОЛОНКА: ФОРМА СОЗДАНИЯ КОРОБКИ -->
        <div class="form-card">
            <div class="form-title">Новая коробка</div>

            <!-- Поле: Комната -->
            <div class="form-group">
                <div class="form-label">Комната</div>
                <select class="select-field">
                    <option value="kitchen">Кухня</option>
                    <option value="bedroom">Спальня</option>
                    <option value="living">Гостиная</option>
                    <option value="bathroom">Ванная</option>
                    <option value="hallway">Прихожая</option>
                    <option value="new">+ Создать новую комнату</option>
                </select>
            </div>

            <!-- Поле: Содержимое -->
            <div class="form-group">
                <div class="form-label">Что внутри?</div>
                <textarea class="textarea-field" placeholder="Кастрюли, тарелки, ножи, разделочная доска..."></textarea>
            </div>

            <!-- Зона добавления фото -->
            <div class="form-group">
                <div class="form-label">Фото содержимого <span class="optional">(необязательно)</span></div>
                <div class="photo-zone">
                    <div class="photo-icon">📷</div>
                    <div class="photo-text">Добавить фото</div>
                    <div class="photo-hint">PNG, JPG до 5 МБ</div>
                </div>
            </div>

            <!-- Чекбокс "Хрупкое" -->
            <div class="checkbox-wrapper">
                <input type="checkbox" id="fragileCheckbox">
                <label for="fragileCheckbox">⚠️ Хрупкое (осторожно при перевозке)</label>
            </div>

            <!-- Кнопка сохранения -->
            <button class="btn-primary">Сохранить и получить QR</button>
        </div>

        <!-- ПРАВАЯ КОЛОНКА: ПРЕВЬЮ QR-КОДА -->
        <div class="preview-card">
            <div class="preview-title">QR-код коробки</div>
            <div class="qr-placeholder"></div>
            <div class="preview-text">
                Заполните форму и нажмите<br>
                «Сохранить и получить QR»
            </div>
            <div class="preview-note">
                После сохранения вы сможете распечатать QR-код<br>
                и наклеить его на коробку
            </div>
        </div>
    </div>
</body>
</html>
