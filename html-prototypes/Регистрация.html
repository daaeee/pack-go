<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack&Go — Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #F5F7FA 0%, #E9ECEF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .register-card {
            width: 440px;
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #2A5C8F;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #6C757D;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1E2A3A;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E9ECEF;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #2A5C8F;
            box-shadow: 0 0 0 3px rgba(42, 92, 143, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: #2A5C8F;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #1E4A73;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(42, 92, 143, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6C757D;
        }

        .login-link a {
            color: #2A5C8F;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">Pack&Go</div>
        <div class="subtitle">Создайте новый аккаунт</div>

        <div class="form-group">
            <label class="input-label">Имя</label>
            <input type="text" class="input-field" placeholder="Анна Иванова">
        </div>

        <div class="form-group">
            <label class="input-label">Email</label>
            <input type="email" class="input-field" placeholder="anna@example.com">
        </div>

        <div class="form-group">
            <label class="input-label">Пароль</label>
            <input type="password" class="input-field" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label class="input-label">Подтвердите пароль</label>
            <input type="password" class="input-field" placeholder="••••••••">
        </div>

        <button class="btn-primary">Зарегистрироваться</button>

        <div class="login-link">
            Уже есть аккаунт? <a>Войти</a>
        </div>
    </div>
</body>
</html>
