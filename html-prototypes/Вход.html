<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #F8F9FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .login-screen {
            width: 375px;
            background: white;
            border-radius: 32px;
            padding: 48px 24px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #2A5C8F;
            text-align: center;
            margin-bottom: 32px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 13px;
            font-weight: 500;
            color: #6C757D;
            margin-bottom: 6px;
            display: block;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E9ECEF;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
        }
        .input-field:focus {
            outline: none;
            border-color: #2A5C8F;
        }
        
        .btn-primary {
            background: #2A5C8F;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
        }
        
        .btn-outline {
            background: transparent;
            border: 1.5px solid #E9ECEF;
            color: #1E2A3A;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            width: 100%;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .divider {
            text-align: center;
            color: #ADB5BD;
            font-size: 12px;
            margin: 20px 0;
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .links a {
            color: #6C757D;
            font-size: 13px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-screen">
        <div class="logo">Pack&Go</div>
        
        <div class="input-group">
            <div class="input-label">Email</div>
            <input class="input-field" type="email" placeholder="example@email.com">
        </div>
        
        <div class="input-group">
            <div class="input-label">Пароль</div>
            <input class="input-field" type="password" placeholder="••••••••">
        </div>
        
        <button class="btn-primary">Войти</button>
        
        <div class="divider">или</div>
        
        <button class="btn-outline">
            <span>📧</span> Продолжить с email
        </button>
        
        <div class="links">
            <a href="#">Забыли пароль?</a>
            <a href="#">Нет аккаунта?</a>
        </div>
    </div>
</body>
</html>
