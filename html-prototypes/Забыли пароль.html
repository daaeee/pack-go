<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack&Go — Восстановление пароля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #F5F7FA 0%, #E9ECEF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            gap: 30px;
            flex-wrap: wrap;
        }

        .reset-card {
            width: 420px;
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #6C757D;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #2A5C8F;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #6C757D;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1E2A3A;
            margin-bottom: 6px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E9ECEF;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #2A5C8F;
            box-shadow: 0 0 0 3px rgba(42, 92, 143, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: #2A5C8F;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #1E4A73;
        }

        .resend-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6C757D;
        }

        .resend-link a {
            color: #2A5C8F;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .back-to-login {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6C757D;
        }

        .back-to-login a {
            color: #2A5C8F;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .step {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: #E9ECEF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #6C757D;
        }

        .step.active {
            background: #2A5C8F;
            color: white;
        }

        .step.completed {
            background: #28A745;
            color: white;
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: #E9ECEF;
        }

        .step-line.completed {
            background: #28A745;
        }
    </style>
</head>
<body>
    <!-- ЭТАП 1: ВВОД EMAIL -->
    <div class="reset-card">
        <div class="back-button">← Назад</div>
        <div class="logo">Pack&Go</div>
        <div class="subtitle">Восстановление пароля</div>
        
        <div class="steps">
            <div class="step active">1</div>
            <div class="step-line"></div>
            <div class="step">2</div>
            <div class="step-line"></div>
            <div class="step">3</div>
        </div>

        <div class="form-group">
            <label class="input-label">Email</label>
            <input type="email" class="input-field" placeholder="example@email.com">
        </div>

        <button class="btn-primary">Отправить код</button>

        <div class="back-to-login">
            <a>Вернуться ко входу</a>
        </div>
    </div>

    <!-- ЭТАП 2: ВВОД КОДА -->
    <div class="reset-card">
        <div class="back-button">← Назад</div>
        <div class="logo">Pack&Go</div>
        <div class="subtitle">Введите код подтверждения</div>
        
        <div class="steps">
            <div class="step completed">✓</div>
            <div class="step-line completed"></div>
            <div class="step active">2</div>
            <div class="step-line"></div>
            <div class="step">3</div>
        </div>

        <div class="form-group">
            <label class="input-label">Код из письма</label>
            <input type="text" class="input-field" placeholder="000000">
        </div>

        <button class="btn-primary">Подтвердить</button>

        <div class="resend-link">
            Не пришёл код? <a>Отправить повторно</a>
        </div>

        <div class="back-to-login">
            <a>Вернуться ко входу</a>
        </div>
    </div>

    <!-- ЭТАП 3: НОВЫЙ ПАРОЛЬ -->
    <div class="reset-card">
        <div class="back-button">← Назад</div>
        <div class="logo">Pack&Go</div>
        <div class="subtitle">Придумайте новый пароль</div>
        
        <div class="steps">
            <div class="step completed">✓</div>
            <div class="step-line completed"></div>
            <div class="step completed">✓</div>
            <div class="step-line completed"></div>
            <div class="step active">3</div>
        </div>

        <div class="form-group">
            <label class="input-label">Новый пароль</label>
            <input type="password" class="input-field" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label class="input-label">Подтвердите пароль</label>
            <input type="password" class="input-field" placeholder="••••••••">
        </div>

        <button class="btn-primary">Сохранить пароль</button>

        <div class="back-to-login">
            <a>Вернуться ко входу</a>
        </div>
    </div>
</body>
</html>
