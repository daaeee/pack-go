<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pack&Go — Сканер QR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #1E2A3A;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .scanner-container {
            width: 400px;
            background: #1E2A3A;
            border-radius: 32px;
            overflow: hidden;
        }

        .camera-view {
            height: 400px;
            background: #2A3A4A;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scan-frame {
            width: 220px;
            height: 220px;
            border: 2px solid white;
            border-radius: 20px;
        }

        .manual-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 14px;
            width: calc(100% - 40px);
            margin: 20px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
        }

        .result-card {
            background: white;
            padding: 20px;
            margin: 0 20px 20px;
            border-radius: 20px;
        }

        .badge {
            background: #E9ECEF;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .btn-unpack {
            background: #2A5C8F;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            margin-top: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="camera-view">
            <div class="scan-frame"></div>
        </div>
        <button class="manual-btn">Ввести номер вручную</button>

        <div class="result-card">
            <div style="display: flex; justify-content: space-between;">
                <span style="font-weight: 600;">✅ Коробка найдена!</span>
                <span class="badge">Упакована</span>
            </div>
            <div style="font-weight: 600; margin-top: 8px;">Коробка #1</div>
            <div style="font-size: 12px; color: #6C757D;">Кухня</div>
            <div style="margin: 12px 0;">Кастрюли, тарелки, ножи</div>
            <div style="font-size: 12px; color: #E67E22;">⚠️ Хрупкое</div>
            <button class="btn-unpack">Отметить распакованной</button>
        </div>
    </div>
</body>
</html>
