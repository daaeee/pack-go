<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #F8F9FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .onboarding-slide {
            width: 375px;
            height: 700px;
            background: white;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 24px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        
        .illustration {
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, #2A5C8F15 0%, #E67E2215 100%);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            position: relative;
        }
        
        /* Анимация сканирования (статичная для Figma) */
        .scan-effect {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 3px;
            background: #E67E22;
            border-radius: 2px;
            box-shadow: 0 0 8px #E67E22;
        }
        
        h1 { 
            font-size: 28px; 
            font-weight: 700; 
            color: #1E2A3A; 
            text-align: center; 
            margin-top: 32px;
            letter-spacing: -0.3px;
        }
        
        p { 
            font-size: 16px; 
            color: #6C757D; 
            text-align: center; 
            line-height: 1.5; 
            margin-top: 16px;
            max-width: 280px;
        }
        
        .dots {
            display: flex;
            gap: 8px;
            margin: 32px 0;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: #DEE2E6;
            transition: all 0.2s;
        }
        .dot.active {
            width: 24px;
            background: #2A5C8F;
        }
        
        .btn-primary {
            background: #2A5C8F;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #1E4A73;
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #DEE2E6;
            color: #6C757D;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-outline:hover {
            background: #F8F9FA;
            border-color: #2A5C8F;
        }
        
        /* Камера в иллюстрации */
        .camera-icon {
            position: relative;
        }
        .camera-lens {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: rgba(42,92,143,0.2);
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="onboarding-slide">
        <div class="illustration">
            📷
            <div class="scan-effect"></div>
        </div>
        <div style="flex:1"></div>
        <h1>Сканируй и находи вещи</h1>
        <p>Наведите камеру на QR-код коробки — приложение мгновенно покажет, что внутри</p>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>
        <button class="btn-primary">Далее</button>
        <button class="btn-outline">Пропустить</button>
    </div>
</body>
</html>
