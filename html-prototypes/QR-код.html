<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pack&Go — QR-код готов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .qr-card {
            background: white;
            border-radius: 32px;
            padding: 48px;
            text-align: center;
            width: 460px;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #28A74520;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .qr-code {
            width: 220px;
            height: 220px;
            background: repeating-linear-gradient(45deg, #1E2A3A 0px, #1E2A3A 4px, #E9ECEF 4px, #E9ECEF 8px);
            border-radius: 24px;
            margin: 24px auto;
        }

        .box-id {
            font-size: 12px;
            color: #6C757D;
            margin-bottom: 24px;
        }

        .btn-primary, .btn-outline {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: #2A5C8F;
            color: white;
            border: none;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #E9ECEF;
            color: #1E2A3A;
        }
    </style>
</head>
<body>
    <div class="qr-card">
        <div class="success-icon">✅</div>
        <h2>Коробка сохранена!</h2>
        <p style="color: #6C757D;">Наклейте QR-код на коробку</p>

        <div class="qr-code"></div>
        <div class="box-id">ID: PKG-8F3A-2B1C</div>

        <button class="btn-primary">Распечатать</button>
        <button class="btn-outline">Добавить ещё коробку</button>
        <button class="btn-outline">Готово</button>
    </div>
</body>
</html>
